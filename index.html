<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>RetroVault - レトロゲームコレクション管理</title>
<meta name="description" content="レトロゲームのカセット・ソフトコレクションを管理するWebアプリ">
<meta name="theme-color" content="#ffb6c1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4f8;
  --surface:#ffffff;
  --surface2:#f8f0f5;
  --text:#3a3255;
  --text-dim:#8888aa;
  --accent:#ff7eb3;
  --accent2:#7ecbff;
  --accent3:#a8e6cf;
  --danger:#ff6b81;
  --pink-soft:#ffe0ec;
  --mint-soft:#d4f5e9;
  --blue-soft:#dbeafe;
  --lavender-soft:#ede4f7;
  --yellow-soft:#fff8dc;
  /* Platform colors - softer pastel versions */
  --fc-red:#e85d5d; --fc-gold:#e8b84d;
  --sfc-purple:#9b6dcc; --sfc-lavender:#c4a8e0;
  --md-black:#4a4a5a; --md-blue:#5a7acc;
  --gb-olive:#7d9a5a; --gb-green:#6dcc6d;
  --gba-indigo:#7b5daa; --gba-cyan:#5dc8c8;
  --n64-green:#4da87a; --n64-red:#cc5a5a;
  --ps1-gray:#9a9ab0; --ps1-blue:#5a7acc;
  --ss-navy:#4a5a8a; --ss-white:#b8b8cc;
  --pce-orange:#d48a4a; --neo-gold:#b89a4a;
  --radius:16px;
  --shadow:0 2px 12px rgba(80,60,120,.08);
  --shadow-hover:0 6px 24px rgba(80,60,120,.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
  background:linear-gradient(135deg, var(--pink-soft) 0%, var(--blue-soft) 50%, var(--mint-soft) 100%);
  background-attachment:fixed;
  color:var(--text); min-height:100vh;
  -webkit-overflow-scrolling:touch;
}
.pixel { font-family:'Press Start 2P',monospace; }

/* ===== HEADER ===== */
#app-header {
  background:linear-gradient(135deg, #ffb6c1 0%, #a8e6cf 50%, #87ceeb 100%);
  padding:14px 20px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 2px 16px rgba(255,150,180,.25);
}
#app-header h1 {
  font-size:clamp(12px,2.8vw,18px);
  color:#fff;
  text-shadow:2px 2px 0 #e88aaa, -1px -1px 0 #e88aaa, 1px -1px 0 #e88aaa, -1px 1px 0 #e88aaa;
  letter-spacing:1px;
}
.header-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
.header-right { display:flex; align-items:center; gap:12px; }
#total-count {
  font-size:clamp(11px,2.2vw,14px);
  color:#fff;
  text-shadow:2px 2px 0 rgba(180,80,120,.4);
  background:linear-gradient(135deg, rgba(255,255,255,.4), rgba(255,200,220,.4));
  padding:8px 16px; border-radius:24px;
  backdrop-filter:blur(6px);
  white-space:nowrap;
  border:2px solid rgba(255,255,255,.5);
  box-shadow:0 2px 12px rgba(255,150,180,.25);
  line-height:1;
}
#total-count .count-number {
  font-size:clamp(18px,4vw,28px);
  display:inline-block;
  margin-left:4px;
  vertical-align:middle;
  color:#fff;
  text-shadow:2px 2px 0 rgba(180,80,120,.5), 0 0 12px rgba(255,200,220,.6);
}
.btn-add {
  background:#fff; color:var(--accent); border:2px solid var(--accent);
  padding:8px 16px; border-radius:24px; cursor:pointer; font-weight:800;
  font-size:12px; min-height:40px; min-width:40px;
  transition:all .25s; white-space:nowrap;
  box-shadow:0 2px 8px rgba(255,126,179,.2);
}
.btn-add:hover { background:var(--accent); color:#fff; transform:scale(1.05); }

/* ===== SEARCH BAR (所持確認サーチ) ===== */
#ownership-search {
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  padding:10px 16px;
  position:sticky; top:56px; z-index:95;
  border-bottom:1px solid rgba(255,182,193,.3);
}
#ownership-search-input {
  width:100%; background:#fff; color:var(--text);
  border:2px solid #eee;
  border-radius:24px; padding:10px 14px 10px 38px; font-size:14px; min-height:44px; outline:none;
  font-family:inherit;
  transition:border-color .2s, box-shadow .2s;
}
#ownership-search-input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(255,126,179,.15);
}
.search-wrapper { position:relative; }
.search-wrapper::before {
  content:'🔍'; position:absolute; left:14px; top:50%; transform:translateY(-50%);
  font-size:14px; pointer-events:none;
}
#ownership-result {
  margin-top:8px; font-size:13px; font-weight:700; min-height:0;
  transition:all .2s;
}
.result-found { color:#2daa6e; background:#e6f9f0; padding:8px 14px; border-radius:12px; }
.result-not-found { color:#e85d75; background:#fce8ec; padding:8px 14px; border-radius:12px; }

/* ===== PLATFORM TABS ===== */
#platform-tabs {
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(8px);
  padding:10px 16px 8px;
  position:sticky; top:112px; z-index:90;
  border-bottom:1px solid rgba(200,200,220,.3);
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  display:flex; gap:6px;
  scrollbar-width:none;
}
#platform-tabs::-webkit-scrollbar { display:none; }
.platform-tab {
  flex-shrink:0; padding:8px 16px; border-radius:20px;
  border:2px solid #e8e0ee; background:#fff; color:var(--text-dim);
  font-size:12px; font-weight:700; cursor:pointer;
  transition:all .25s; white-space:nowrap; min-height:36px;
  font-family:inherit;
}
.platform-tab:hover { border-color:var(--accent); color:var(--text); box-shadow:var(--shadow); }
.platform-tab.active {
  background:var(--accent); color:#fff; border-color:var(--accent);
  box-shadow:0 3px 12px rgba(255,126,179,.3);
}
.platform-tab .tab-count {
  display:inline-block; margin-left:4px; font-size:10px; opacity:.7;
}

/* ===== SORT/FILTER BAR ===== */
#sort-filter-bar {
  max-width:800px; margin:0 auto;
  padding:10px 16px 4px;
  display:flex; gap:6px; flex-wrap:wrap; align-items:center;
}
.sort-btn {
  padding:6px 14px; border-radius:20px;
  border:2px solid #e8e0ee; background:#fff; color:var(--text-dim);
  font-size:11px; font-weight:700; cursor:pointer;
  transition:all .2s; white-space:nowrap; min-height:32px;
  font-family:inherit; display:flex; align-items:center; gap:4px;
}
.sort-btn:hover { border-color:var(--accent); color:var(--text); }
.sort-btn.active { background:var(--lavender-soft); color:var(--text); border-color:#c4a8e0; }
.sort-btn .sort-arrow { font-size:10px; }
#maker-filter {
  padding:6px 12px; border-radius:20px;
  border:2px solid #e8e0ee; background:#fff; color:var(--text);
  font-size:11px; font-weight:700; min-height:32px;
  font-family:inherit; outline:none; cursor:pointer;
  transition:border-color .2s;
  max-width:180px;
}
#maker-filter:focus { border-color:var(--accent); }

/* ===== GAME LIST ===== */
#game-list {
  max-width:800px; margin:0 auto; padding:8px 16px 100px;
}
.list-item {
  display:flex; align-items:center; gap:12px;
  padding:14px 16px; margin-bottom:6px;
  background:#fff; border-radius:14px;
  cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
  box-shadow:var(--shadow);
}
.list-item:hover { box-shadow:var(--shadow-hover); transform:translateY(-2px); }
.list-item:active { transform:scale(0.98); }
.list-color-bar {
  position:absolute; left:0; top:0; bottom:0; width:5px;
  border-radius:14px 0 0 14px;
}
.list-title {
  font-size:14px; font-weight:700; flex:1; padding-left:10px;
  line-height:1.4; color:var(--text);
}
.list-platform-badge {
  font-size:9px; font-weight:700; padding:4px 10px; border-radius:12px;
  color:#fff; white-space:nowrap; flex-shrink:0;
}

/* Empty state */
.empty-state {
  text-align:center; padding:60px 20px; color:var(--text-dim);
  background:#fff; border-radius:20px; margin-top:20px;
  box-shadow:var(--shadow);
}
.empty-state .icon { font-size:64px; margin-bottom:16px; }

/* ===== DETAIL SHEET (Slide-up) ===== */
.sheet-overlay {
  display:none; position:fixed; inset:0; background:rgba(60,40,80,.3); z-index:200;
  backdrop-filter:blur(4px);
  opacity:0; transition:opacity .3s;
}
.sheet-overlay.active { display:block; opacity:1; }
.detail-sheet {
  position:fixed; bottom:0; left:0; right:0; z-index:210;
  background:#fff; border-radius:24px 24px 0 0;
  max-height:85vh; overflow-y:auto;
  transform:translateY(100%); transition:transform .35s cubic-bezier(.32,.72,.24,1.02);
  padding:0 0 env(safe-area-inset-bottom, 20px);
  box-shadow:0 -4px 30px rgba(80,60,120,.15);
}
.detail-sheet.active { transform:translateY(0); }
.sheet-handle {
  width:40px; height:4px; background:#ddd; border-radius:2px;
  margin:10px auto 0; cursor:grab;
}
.sheet-content { padding:16px 20px 24px; }
.detail-img {
  width:100%; max-height:320px; object-fit:contain; border-radius:16px;
  margin-bottom:16px; background:var(--surface2);
}
.detail-title { font-size:18px; font-weight:800; margin-bottom:8px; line-height:1.4; color:var(--text); }
.detail-platform-badge {
  display:inline-block; padding:5px 14px; border-radius:12px;
  font-size:11px; font-weight:700; color:#fff; margin-bottom:14px;
}
.detail-info { margin-bottom:16px; }
.detail-info-row {
  display:flex; gap:8px; padding:10px 0; border-bottom:1px solid #f0ecf4;
  font-size:13px;
}
.detail-info-label { color:var(--text-dim); min-width:70px; flex-shrink:0; }
.detail-info-value { color:var(--text); font-weight:600; }
.detail-memo {
  margin-top:8px; padding:14px; background:var(--surface2); border-radius:14px;
  font-size:13px; line-height:1.7; white-space:pre-wrap; color:#6a5a7a;
}
.detail-memo-title { font-size:11px; color:var(--text-dim); margin-bottom:6px; font-weight:700; }
.detail-actions {
  display:flex; gap:10px; margin-top:20px;
}
.detail-actions button {
  flex:1; padding:12px; border:none; border-radius:14px; cursor:pointer;
  font-size:13px; font-weight:700; min-height:48px; transition:all .2s;
  font-family:inherit;
}
.btn-edit-detail { background:var(--blue-soft); color:#5a7acc; }
.btn-edit-detail:hover { background:#c8d8f8; }
.btn-delete-detail { background:#fce8ec; color:var(--danger); }
.btn-delete-detail:hover { background:#f8d0d8; }

/* ===== MODAL OVERLAY (register/edit form) ===== */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(60,40,80,.4); z-index:300;
  backdrop-filter:blur(4px);
  overflow-y:auto; padding:20px; justify-content:center; align-items:flex-start; }
.modal-overlay.active { display:flex; }
.modal-box { background:#fff; border:none; border-radius:24px;
  width:100%; max-width:600px; margin:auto; padding:24px; position:relative;
  box-shadow:0 8px 40px rgba(80,60,120,.15); }
.modal-box h2 { font-size:13px; margin-bottom:16px; color:var(--accent); }
.modal-close { position:absolute; top:12px; right:12px; background:var(--pink-soft); border:none; color:var(--accent);
  font-size:20px; cursor:pointer; min-width:40px; min-height:40px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; transition:background .2s; }
.modal-close:hover { background:var(--accent); color:#fff; }
.form-group { margin-bottom:14px; }
.form-group label { display:block; font-size:12px; color:var(--text-dim); margin-bottom:4px; font-weight:700; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; background:#fff;
  color:var(--text); border:2px solid #eee; border-radius:12px; padding:10px 12px; font-size:14px;
  min-height:44px; outline:none; font-family:inherit;
  transition:border-color .2s, box-shadow .2s;
}
.form-group textarea { min-height:80px; resize:vertical; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color:var(--accent); box-shadow:0 0 0 3px rgba(255,126,179,.12);
}
.btn-submit {
  width:100%; background:linear-gradient(135deg, #ffb6c1, #a8e6cf);
  color:#fff; text-shadow:1px 1px 0 rgba(0,0,0,.1);
  border:none; padding:14px; border-radius:16px; font-size:15px; font-weight:800;
  cursor:pointer; min-height:48px;
  box-shadow:0 4px 16px rgba(255,150,180,.3);
  transition:transform .2s, box-shadow .2s;
}
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(255,150,180,.4); }

/* SUGGEST */
#suggest-list { background:#fff; border:2px solid #eee; border-radius:12px;
  max-height:200px; overflow-y:auto; display:none; position:absolute; left:0; right:0; z-index:10;
  box-shadow:var(--shadow-hover); }
#suggest-list .suggest-item { padding:10px 14px; cursor:pointer; font-size:13px; border-bottom:1px solid #f5f0f8; }
#suggest-list .suggest-item:hover { background:var(--pink-soft); color:var(--text); }
.wiki-thumb-preview { margin-top:8px; }
.wiki-thumb-preview img { max-width:120px; border-radius:12px; border:3px solid var(--accent); cursor:pointer; }
.wiki-thumb-preview.selected img { box-shadow:0 0 12px rgba(255,126,179,.4); }

/* UPLOAD */
.upload-area { border:2px dashed #ddd; border-radius:var(--radius); padding:20px; text-align:center;
  cursor:pointer; transition:all .2s; min-height:80px; display:flex; align-items:center;
  justify-content:center; flex-direction:column; gap:8px; background:var(--surface2); }
.upload-area:hover { border-color:var(--accent); background:var(--pink-soft); }
.upload-area img { max-width:150px; max-height:100px; border-radius:12px; }
.upload-area input { display:none; }
.loading-spinner { display:inline-block; width:16px; height:16px; border:2px solid #ddd;
  border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-left:8px; }
@keyframes spin { to{transform:rotate(360deg)} }

/* PLATFORM BADGE COLORS */
.plat-fc{background:var(--fc-red);} .plat-sfc{background:var(--sfc-purple);}
.plat-md{background:var(--md-black);} .plat-gb{background:var(--gb-olive);}
.plat-gba{background:var(--gba-indigo);} .plat-n64{background:var(--n64-green);}
.plat-ps1{background:var(--ps1-blue);} .plat-ss{background:var(--ss-navy);}
.plat-pce{background:var(--pce-orange);} .plat-neo{background:var(--neo-gold);}
.plat-other{background:#aaa;}

.bar-fc{background:var(--fc-red);} .bar-sfc{background:var(--sfc-purple);}
.bar-md{background:var(--md-black);} .bar-gb{background:var(--gb-olive);}
.bar-gba{background:var(--gba-indigo);} .bar-n64{background:var(--n64-green);}
.bar-ps1{background:var(--ps1-blue);} .bar-ss{background:var(--ss-navy);}
.bar-pce{background:var(--pce-orange);} .bar-neo{background:var(--neo-gold);}
.bar-other{background:#aaa;}

/* ===== DECORATIVE STARS ===== */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:-1;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,182,193,.3) 0, transparent 3px),
    radial-gradient(circle at 80% 15%, rgba(168,230,207,.3) 0, transparent 3px),
    radial-gradient(circle at 60% 70%, rgba(135,206,235,.3) 0, transparent 4px),
    radial-gradient(circle at 25% 85%, rgba(255,182,193,.25) 0, transparent 3px),
    radial-gradient(circle at 90% 60%, rgba(168,230,207,.25) 0, transparent 3px),
    radial-gradient(circle at 40% 40%, rgba(237,228,247,.4) 0, transparent 5px);
}

/* ===== RESPONSIVE ===== */
@media(max-width:767px){
  #app-header { padding:10px 14px; }
  #ownership-search { top:48px; padding:8px 12px; }
  #platform-tabs { top:103px; padding:8px 12px 6px; }
  .list-item { padding:12px 14px; }
  .detail-sheet { max-height:90vh; }
  .modal-box { border-radius:20px 20px 0 0; min-height:100vh; padding:16px; margin:0; max-width:100%; }
}
@media(max-width:479px){
  .header-row { flex-direction:row; }
  .btn-add { padding:6px 12px; font-size:11px; }
  #total-count { font-size:8px; }
  .list-title { font-size:13px; }
  #app-header h1 { font-size:11px; }
}
</style>
</head>
<body>
<!-- HEADER -->
<header id="app-header">
  <div class="header-row">
    <div>
      <h1 class="pixel">🎮 RetroVault</h1>
    </div>
    <div class="header-right">
      <span id="total-count" class="pixel">所有数 <span class="count-number" id="count-number">0</span></span>
      <button class="btn-add pixel" onclick="openForm()">＋ 登録</button>
    </div>
  </div>
</header>

<!-- OWNERSHIP SEARCH -->
<div id="ownership-search">
  <div class="search-wrapper">
    <input type="search" id="ownership-search-input" placeholder="所持確認サーチ...タイトルを入力">
  </div>
  <div id="ownership-result"></div>
</div>

<!-- PLATFORM TABS -->
<div id="platform-tabs"></div>

<!-- SORT/FILTER BAR -->
<div id="sort-filter-bar">
  <button class="sort-btn active" id="sort-title" onclick="setSort('title')">あいうえお順 <span class="sort-arrow">▲</span></button>
  <button class="sort-btn" id="sort-year" onclick="setSort('year')">発売年順 <span class="sort-arrow">▲</span></button>
  <select id="maker-filter" onchange="renderList()">
    <option value="">すべてのメーカー</option>
  </select>
</div>

<!-- GAME LIST -->
<div id="game-list"></div>

<!-- DETAIL SHEET -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeDetail()"></div>
<div class="detail-sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-content" id="detail-content"></div>
</div>

<!-- REGISTER/EDIT MODAL -->
<div class="modal-overlay" id="form-modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeForm()">&times;</button>
    <h2 class="pixel">ゲーム登録</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group" style="position:relative">
      <label>タイトル</label>
      <input type="text" id="f-title" placeholder="ゲーム名を入力（自動検索）" autocomplete="off">
      <div id="suggest-list"></div>
      <span id="wiki-loading" style="display:none"><span class="loading-spinner"></span> Wikipedia検索中...</span>
    </div>
    <div class="form-group"><label>機種</label>
      <select id="f-platform">
        <option value="">選択してください</option>
        <option value="ファミコン">ファミコン</option><option value="スーパーファミコン">スーパーファミコン</option>
        <option value="メガドライブ">メガドライブ</option><option value="ゲームボーイ">ゲームボーイ</option>
        <option value="ゲームボーイアドバンス">ゲームボーイアドバンス</option><option value="NINTENDO64">NINTENDO64</option>
        <option value="PlayStation">PlayStation</option><option value="セガサターン">セガサターン</option>
        <option value="PCエンジン">PCエンジン</option><option value="ネオジオ">ネオジオ</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="form-group"><label>ジャンル</label>
      <input type="text" id="f-genre" placeholder="アクション、RPG、シューティング等"></div>
    <div class="form-group"><label>発売年</label>
      <input type="text" id="f-year" placeholder="1990"></div>
    <div class="form-group"><label>メーカー</label>
      <input type="text" id="f-maker" placeholder="開発元・発売元"></div>
    <div class="form-group"><label>メモ</label>
      <textarea id="f-memo" placeholder="概要やコメント"></textarea></div>
    <div class="form-group"><label>写真</label>
      <div class="upload-area" id="upload-area" onclick="document.getElementById('f-photo').click()">
        <span id="upload-text">📷 タップして写真を選択</span>
        <img id="photo-preview" style="display:none">
        <input type="file" id="f-photo" accept="image/jpeg,image/png" capture="environment">
      </div>
      <div class="wiki-thumb-preview" id="wiki-thumb-area" style="display:none">
        <label style="font-size:11px;color:var(--text-dim)">Wikipediaサムネイル（クリックで使用）:</label>
        <img id="wiki-thumb-img" onclick="useWikiThumb()">
      </div>
    </div>
    <input type="hidden" id="f-photo-data">
    <button class="btn-submit pixel" onclick="saveGame()">💾 保存</button>
  </div>
</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(err => console.warn('SW registration failed:', err));
}
</script>
</body>
</html>
